name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Create plugin ZIP
        run: |
          mkdir -p /tmp/release/erp-sync-products-and-coupons
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.DS_Store' \
            --exclude='*.log' \
            ./ /tmp/release/erp-sync-products-and-coupons/
          cd /tmp/release
          zip -r erp-sync-products-and-coupons-v${{ steps.version.outputs.VERSION }}.zip erp-sync-products-and-coupons/
          echo "ZIP: $(ls -lh erp-sync-products-and-coupons-v${{ steps.version.outputs.VERSION }}.zip)"

      - name: Create release and upload ZIP
        uses: softprops/action-gh-release@v2
        with:
          name: "Release ${{ github.ref_name }}"
          generate_release_notes: true
          make_latest: true
          files: /tmp/release/erp-sync-products-and-coupons-v${{ steps.version.outputs.VERSION }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
